services:
  postgres:
    ports: !reset []

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: postgresql+psycopg2://app_readonly:${APP_DB_PASSWORD:?set APP_DB_PASSWORD}@postgres:5432/warehouse
      LLM_DATABASE_URL: postgresql+psycopg2://llm_readonly:${LLM_DB_PASSWORD:?set LLM_DB_PASSWORD}@postgres:5432/warehouse
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-3-ultra-550b-a55b:free}
    depends_on:
      postgres:
        condition: service_healthy
    cap_drop: [ALL]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2.8.4-alpine
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
