# Phase 0 — Airflow (LocalExecutor) + Postgres warehouse, รันคำสั่งเดียว: docker compose up
# ponytail: LocalExecutor not Celery/Redis — single-VM portfolio doesn't need distributed workers.
#           สลับเป็น CeleryExecutor เมื่อต้อง scale หลาย worker จริง ๆ
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # ponytail: ติดตั้ง deps ตอน start พอสำหรับ dev; ทำ Dockerfile เมื่อ build เสถียร/CI
    # pin ครบ — pandas ต้อง 2.x (3.0 พัง read_sql กับ SQLAlchemy 1.4 ที่ Airflow บังคับใช้)
    _PIP_ADDITIONAL_REQUIREMENTS: "yfinance==1.4.1 fredapi==0.5.2 dbnomics==1.2.7 pandera==0.32.0 pandas==2.2.3 statsmodels==0.14.4 apache-airflow-providers-postgres"
    # warehouse conn ให้ DAG เรียกใช้ (bronze/silver/gold อยู่ใน db ชื่อ warehouse)
    AIRFLOW_CONN_WAREHOUSE: postgresql://warehouse:warehouse@postgres:5432/warehouse
    BOT_API_KEY: ${BOT_API_KEY:-}
    BOT_API_STAT_KEY: ${BOT_API_STAT_KEY:-}
    FRED_API_KEY: ${FRED_API_KEY:-}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./config:/opt/airflow/config
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # สร้าง db warehouse + schema bronze/silver/gold
    ports:
      - "5433:5432"   # host 5433 — กันชนกับ Postgres ที่ลงบน Windows อยู่แล้ว (จับ 5432)
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate && airflow users create --username admin --password admin --firstname a --lastname a --role Admin --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
