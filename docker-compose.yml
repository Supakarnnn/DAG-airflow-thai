# Phase 0 — Airflow (LocalExecutor) + Postgres warehouse, รันคำสั่งเดียว: docker compose up
# ponytail: LocalExecutor not Celery/Redis — single-VM portfolio doesn't need distributed workers.
#           สลับเป็น CeleryExecutor เมื่อต้อง scale หลาย worker จริง ๆ
x-airflow-common: &airflow-common
  build: .   # Dockerfile = base image + Java + pyspark (สำหรับ ingest_set_spark)
  image: thai-mac-airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # ponytail: low concurrency keeps the full non-Spark stack usable on a 1 GB portfolio VPS.
    AIRFLOW__CORE__PARALLELISM: "2"
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "1"
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
    AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "60"
    # warehouse conn ให้ DAG เรียกใช้ (bronze/silver/gold อยู่ใน db ชื่อ warehouse)
    AIRFLOW_CONN_WAREHOUSE: postgresql://warehouse:${WAREHOUSE_PASSWORD:?set WAREHOUSE_PASSWORD}@postgres:5432/warehouse
    BOT_API_KEY: ${BOT_API_KEY:-}
    BOT_API_STAT_KEY: ${BOT_API_STAT_KEY:-}
    FRED_API_KEY: ${FRED_API_KEY:-}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./config:/opt/airflow/config
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data   # parquet lake ของ DAG spark (gitignored)
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: airflow
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:?set WAREHOUSE_PASSWORD}
      LLM_DB_PASSWORD: ${LLM_DB_PASSWORD:?set LLM_DB_PASSWORD}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?set APP_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # สร้าง db warehouse + schema bronze/silver/gold
    ports:
      - "127.0.0.1:5433:5432"   # local only; ห้ามเปิด DB ออก internet
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate && airflow users create --username "$${AIRFLOW_ADMIN_USER}" --password "$${AIRFLOW_ADMIN_PASSWORD}" --firstname Admin --lastname User --role Admin --email "$${AIRFLOW_ADMIN_EMAIL}" || true
    environment:
      <<: *airflow-env
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:?set AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?set AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:?set AIRFLOW_ADMIN_EMAIL}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
